<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Students | admin</title>
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <nav class="navbar">
    <div class="container flex justify-between items-center">
      <div class="flex items-center gap-md">
        <a href="admin-dashboard.html" class="brand">
          <span class="brand-dot" style="background-color: var(--secondary);"></span>
          admin
        </a>
        <ul class="nav-links" style="margin-left: var(--space-lg);">
          <li><a href="admin-dashboard.html">Dashboard</a></li>
          <li><a href="admin-students.html" class="active">Students</a></li>
          <li><a href="admin-menu.html">Menu</a></li>
          <li><a href="admin-inventory.html">Inventory</a></li>
          <li><a href="admin-extras.html">Extra Charges</a></li>
        </ul>
      </div>
            <div class="user-profile">
        <div class="avatar" onclick="toggleProfileDropdown(event)" style="cursor:pointer; background: linear-gradient(135deg, var(--bg-surface-elevated), var(--text-muted)); color: #fff;">MG</div>
        <div class="dropdown-menu" id="profile-dropdown">
          <a href="#" class="dropdown-item" id="dropdown-name" style="font-weight:600; border-bottom: 1px solid rgba(255,255,255,0.08); pointer-events:none;">Admin</a>
          <a href="index.html" class="dropdown-item" onclick="doLogout(event)" style="color: #ff6b6b;">&#x2192; Logout</a>
        </div>
      </div>
    </div>
  </nav>

  <main class="container">
    <div class="dash-header reveal delay-1" style="margin-top: var(--space-lg);">
      <h1 class="font-serif">Registered Students</h1>
      <p class="text-muted">View all students currently enrolled in the mess.</p>
    </div>

    <div class="bento-grid">
      <div class="glass-panel bento-hero reveal delay-2">
        <div style="overflow-x: auto;">
          <table class="data-table" id="students-table">
            <thead>
              <tr>
                <th>Student ID</th>
                <th>Name</th>
                <th>Room No</th>
                <th>Subscription</th>
              </tr>
            </thead>
            <tbody>
              <tr><td colspan="4">Loading students...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script src="js/app.js"></script>
</body>
</html>

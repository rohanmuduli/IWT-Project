<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Silicon FoodCourt</title>
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  
  <nav class="navbar">
    <div class="container flex justify-between items-center">
      <a href="index.html" class="brand">
        <span class="brand-dot"></span>
        Silicon FoodCourt
      </a>
      <a href="index.html" class="btn btn-outline" style="padding: 0.5rem 1rem;">Back to Login</a>
    </div>
  </nav>

  <main class="container">
    <section class="hero-section" style="grid-template-columns: 1fr; max-width: 600px; margin: 0 auto; padding-top: var(--space-xl);">
      
      <div class="dash-header reveal delay-1" style="text-align: center;">
        <h1 class="text-gradient">Join the Mess</h1>
        <p class="text-muted">Register your student ID to access the dining portal.</p>
      </div>

      <div class="auth-panel glass-panel reveal delay-2">
        <form id="register-form" action="index.html">
          <div class="input-group">
            <label for="reg-name">Full Name</label>
            <input type="text" id="reg-name" class="input-field" placeholder="John Doe" required>
          </div>
          <div class="input-group">
            <label for="reg-id">Student ID</label>
            <input type="text" id="reg-id" class="input-field" placeholder="STU12345" required>
          </div>
          <div class="input-group">
            <label for="reg-room">Room Number</label>
            <input type="text" id="reg-room" class="input-field" placeholder="e.g. 402" required>
          </div>
          <div class="input-group" style="margin-bottom: var(--space-md);">
            <label>Subscription Plan</label>
            <div class="flex gap-sm">
              <label class="input-field flex items-center gap-sm" style="flex:1; cursor: pointer;">
                <input type="radio" name="sub_plan" value="Full Mess" checked> Full Mess
              </label>
              <label class="input-field flex items-center gap-sm" style="flex:1; cursor: pointer;">
                <input type="radio" name="sub_plan" value="Partial Mess"> Partial Mess
              </label>
            </div>
          </div>
          <div class="input-group">
            <label for="reg-pass">Password</label>
            <input type="password" id="reg-pass" class="input-field" placeholder="ΓÇóΓÇóΓÇóΓÇóΓÇóΓÇóΓÇóΓÇó" required>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Register Account</button>
        </form>
      </div>

    </section>
  </main>

  
  <script src="js/app.js"></script>
</body>
</html>

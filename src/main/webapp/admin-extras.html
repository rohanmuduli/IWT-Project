<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Extra Charges | admin</title>
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <nav class="navbar">
    <div class="container flex justify-between items-center">
      <div class="flex items-center gap-md">
        <a href="admin-dashboard.html" class="brand">
          <span class="brand-dot" style="background-color: var(--secondary);"></span>
          admin
        </a>
        <ul class="nav-links" style="margin-left: var(--space-lg);">
          <li><a href="admin-dashboard.html">Dashboard</a></li>
          <li><a href="admin-students.html">Students</a></li>
          <li><a href="admin-menu.html">Menu</a></li>
          <li><a href="admin-inventory.html">Inventory</a></li>
          <li><a href="admin-extras.html" class="active">Extra Charges</a></li>
        </ul>
      </div>
            <div class="user-profile">
        <div class="avatar" onclick="toggleProfileDropdown(event)" style="cursor:pointer; background: linear-gradient(135deg, var(--bg-surface-elevated), var(--text-muted)); color: #fff;">MG</div>
        <div class="dropdown-menu" id="profile-dropdown">
          <a href="#" class="dropdown-item" id="dropdown-name" style="font-weight:600; border-bottom: 1px solid rgba(255,255,255,0.08); pointer-events:none;">Admin</a>
          <a href="index.html" class="dropdown-item" onclick="doLogout(event)" style="color: #ff6b6b;">&#x2192; Logout</a>
        </div>
      </div>
    </div>
  </nav>

  <main class="container">
    <div class="dash-header reveal delay-1" style="margin-top: var(--space-lg);">
      <h1 class="font-serif">Extra Charges</h1>
      <p class="text-muted">Log additional purchases for student billing.</p>
    </div>

    <div class="bento-grid">
      
      <!-- Add Extra Charge Form -->
      <div class="glass-panel bento-stat reveal delay-2">
        <h3 class="font-serif" style="margin-bottom: var(--space-md);">Log Purchase</h3>
        <form id="add-extra-form">
          <div class="input-group">
            <label>Student ID</label>
            <input type="text" id="ext-student" class="input-field" placeholder="e.g. STU12345" required>
          </div>
          <div class="input-group">
            <label>Item Name</label>
            <input type="text" id="ext-item" class="input-field" placeholder="e.g. Evening Coffee" required>
          </div>
          <div class="flex gap-sm">
            <div class="input-group" style="flex:1;">
              <label>Quantity</label>
              <input type="number" id="ext-qty" class="input-field" required>
            </div>
            <div class="input-group" style="flex:1;">
              <label>Total Amount (₹)</label>
              <input type="number" id="ext-amount" class="input-field" required>
            </div>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Log Charge</button>
        </form>
      </div>

      <!-- Extra Charges Table -->
      <div class="glass-panel bento-hero reveal delay-3">
        <h3 class="font-serif" style="margin-bottom: var(--space-md);">Recent Logs</h3>
        <div style="overflow-x: auto;">
          <table class="data-table" id="extras-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Student ID</th>
                <th>Item</th>
                <th>Qty</th>
                <th>Amount</th>
              </tr>
            </thead>
            <tbody>
              <!-- Populated by JS -->
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </main>

  <script src="js/app.js"></script>
</body>
</html>

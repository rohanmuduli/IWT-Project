<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Management | admin</title>
  <link rel="stylesheet" href="css/design-system.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <nav class="navbar">
    <div class="container flex justify-between items-center">
      <div class="flex items-center gap-md">
        <a href="admin-dashboard.html" class="brand">
          <span class="brand-dot" style="background-color: var(--secondary);"></span>
          admin
        </a>
        <ul class="nav-links" style="margin-left: var(--space-lg);">
          <li><a href="admin-dashboard.html">Dashboard</a></li>
          <li><a href="admin-students.html">Students</a></li>
          <li><a href="admin-menu.html" class="active">Menu</a></li>
          <li><a href="admin-inventory.html">Inventory</a></li>
          <li><a href="admin-extras.html">Extra Charges</a></li>
        </ul>
      </div>
            <div class="user-profile">
        <div class="avatar" onclick="toggleProfileDropdown(event)" style="cursor:pointer; background: linear-gradient(135deg, var(--bg-surface-elevated), var(--text-muted)); color: #fff;">MG</div>
        <div class="dropdown-menu" id="profile-dropdown">
          <a href="#" class="dropdown-item" id="dropdown-name" style="font-weight:600; border-bottom: 1px solid rgba(255,255,255,0.08); pointer-events:none;">Admin</a>
          <a href="index.html" class="dropdown-item" onclick="doLogout(event)" style="color: #ff6b6b;">&#x2192; Logout</a>
        </div>
      </div>
    </div>
  </nav>

  <main class="container">
    <div class="dash-header reveal delay-1" style="margin-top: var(--space-lg);">
      <h1 class="font-serif">Menu Management</h1>
      <p class="text-muted">Update the daily culinary offerings for students.</p>
    </div>

    <div class="bento-grid">
      
      <!-- Update Menu Form -->
      <div class="glass-panel bento-hero reveal delay-2">
        <h3 class="font-serif" style="margin-bottom: var(--space-md);">Publish Menu</h3>
        <form id="update-menu-form">
          <div class="input-group" style="max-width: 200px;">
            <label>Date</label>
            <input type="date" id="menu-date" class="input-field" required>
          </div>
          
          <div class="bento-grid" style="padding: 0;">
            <div class="input-group bento-stat">
              <label>Breakfast</label>
              <textarea id="menu-breakfast" class="input-field" rows="3" placeholder="e.g. Idli, Vada, Sambar..."></textarea>
            </div>
            <div class="input-group bento-stat">
              <label>Lunch</label>
              <textarea id="menu-lunch" class="input-field" rows="3" placeholder="e.g. Rice, Dal, Paneer..."></textarea>
            </div>
            <div class="input-group bento-stat">
              <label>Dinner</label>
              <textarea id="menu-dinner" class="input-field" rows="3" placeholder="e.g. Roti, Chicken Curry..."></textarea>
            </div>
          </div>
          
          <button type="submit" class="btn btn-primary" style="margin-top: var(--space-md);">Save & Publish Menu</button>
        </form>
      </div>

    </div>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
